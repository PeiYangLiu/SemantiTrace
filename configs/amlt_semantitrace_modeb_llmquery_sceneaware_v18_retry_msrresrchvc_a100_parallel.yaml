description: |
  H100 parallel-query retry of Mode-B natural-object 1M-unique evaluation with VLM-generated audit
  queries that do not reveal the full color/object/location signature. The job
  materializes revised records, extracts OpenImages tar shards to /scratch,
  runs exact CLIP top-k export, then runs Qwen3-VL mode-aware E2E from local
  hit images. Outputs are written to blob; small hit images are tarred before
  reuse to avoid repeated blob small-file reads.

target:
  service: singularity
  name: msrresrchvc
  workspace_name: Workspace_NLC

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: .

storage:
  output:
    storage_account_name: conversationhub
    container_name: v-peiyangliu
    mount_dir: /mnt/output
    is_output: true

jobs:
  - name: modeb-sceneaware-v18-a100-parallel-1m-topk-e2e
    identity: managed
    sku: 40G8-A100-IB-NvLink
    process_count_per_node: 1
    sla_tier: premium
    command:
      - |
        cd /tmp/amlt-code-download 2>/dev/null || cd /mnt/default/code
        set -euo pipefail
        PY=/opt/conda/envs/ptca/bin/python
        if [ ! -x "$$PY" ]; then PY=python; fi
        export PYTHONUSERBASE=/scratch/python_userbase
        export PATH="$$PYTHONUSERBASE/bin:$$PATH"
        "$$PY" -m pip install --user -r requirements-real.txt hf-transfer
        "$$PY" -m pip install --user --force-reinstall --no-deps "opencv-python-headless==4.11.0.86"
        "$$PY" -m pip install --user "open-clip-torch>=3.3.0" "transformers>=5.9.0" "accelerate>=1.13.0" "opencv-python-headless>=4.10" "pillow>=12"
        test -d "$$TAR_ROOT"
        test -f "$$MODEB_DATA_ROOT/nontext_modeb_natural_1m_n500/canary_records_first500.json"
        test -d "$$UPLOADED_MODEL_SNAPSHOTS/qwen"

        LOCAL_ROOT=/scratch/modeb_llmquery_retry
        LOCAL_IMAGES=$$LOCAL_ROOT/images
        LOCAL_RECORDS_DIR=$$LOCAL_ROOT/records
        LOCAL_RECORDS=$$LOCAL_RECORDS_DIR/canary_records_first500_llmquery.json
        LOCAL_TOPK=$$LOCAL_ROOT/topk_merged
        mkdir -p "$$LOCAL_ROOT" "$$LOCAL_IMAGES" "$$LOCAL_RECORDS_DIR" "$$OUTPUT_ROOT/records" "$$OUTPUT_ROOT/topk_shards" "$$OUTPUT_ROOT/topk_merged" "$$OUTPUT_ROOT/e2e_shards" "$$OUTPUT_ROOT/e2e_merged"

        QUERY_SHARDS=$$LOCAL_ROOT/query_shards
        mkdir -p "$$QUERY_SHARDS" "$$OUTPUT_ROOT/query_shards"
        run_query_shard() {
          local gpu="$$1"
          local shard_json="$$QUERY_SHARDS/shard_$${gpu}.json"
          if [ -f "$$OUTPUT_ROOT/query_shards/shard_$${gpu}.done" ] && [ -f "$$OUTPUT_ROOT/query_shards/shard_$${gpu}.json" ]; then
            echo "[resume] query shard_$${gpu} already done; reusing"
            cp "$$OUTPUT_ROOT/query_shards/shard_$${gpu}.json" "$$shard_json"
            return 0
          fi
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/materialize_modeb_llm_query_records.py \
              --records "$$MODEB_DATA_ROOT/nontext_modeb_natural_1m_n500/canary_records_first500.json" \
              --record_root "$$MODEB_DATA_ROOT" \
              --output "$$shard_json" \
              --max_records 500 \
              --num_queries 3 \
              --shard_count 8 \
              --shard_index "$$gpu" \
              --qwen_model "$$UPLOADED_MODEL_SNAPSHOTS/qwen" \
              --device cuda \
              --allow_object_term
            cp "$$shard_json" "$$OUTPUT_ROOT/query_shards/shard_$${gpu}.json"
            touch "$$OUTPUT_ROOT/query_shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/query_shards/shard_$${gpu}.log"
        }
        run_query_shard 0 & q0=$$!
        run_query_shard 1 & q1=$$!
        run_query_shard 2 & q2=$$!
        run_query_shard 3 & q3=$$!
        run_query_shard 4 & q4=$$!
        run_query_shard 5 & q5=$$!
        run_query_shard 6 & q6=$$!
        run_query_shard 7 & q7=$$!
        wait $$q0 $$q1 $$q2 $$q3 $$q4 $$q5 $$q6 $$q7
        "$$PY" scripts/merge_modeb_llm_query_records.py \
          --shards_dir "$$QUERY_SHARDS" \
          --output "$$LOCAL_RECORDS" \
          --expected_records 500
        cp "$$LOCAL_RECORDS" "$$OUTPUT_ROOT/records/canary_records_first500_llmquery.json"

        if [ ! -f "$$LOCAL_ROOT/.untar.done" ]; then
          rm -rf "$$LOCAL_IMAGES"
          mkdir -p "$$LOCAL_IMAGES"
          echo "[untar] extracting all OpenImages tar shards to $$LOCAL_IMAGES"
          for tar_file in "$$TAR_ROOT"/*.tar; do
            echo "[untar] $$tar_file"
            tar -C "$$LOCAL_IMAGES" -xf "$$tar_file"
          done
          touch "$$LOCAL_ROOT/.untar.done"
        fi

        run_topk_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/topk_shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.done" ]; then
            echo "[resume] topk shard_$${gpu} already done; skipping"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_unique_clip_topk_shard.py \
              --records "$$LOCAL_RECORDS" \
              --record_root "$$MODEB_DATA_ROOT" \
              --distractor_dir "$$LOCAL_IMAGES" \
              --output_dir "$$outdir" \
              --file_shard_count 8 \
              --file_shard_index "$$gpu" \
              --max_records 500 \
              --top_k "$$TOP_K" \
              --batch_size "$$BATCH_SIZE" \
              --num_workers "$$NUM_WORKERS" \
              --device cuda
            touch "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.log"
        }

        if [ -f "$$OUTPUT_ROOT/topk_merged/unique_topk_hits.jsonl" ] && [ -f "$$OUTPUT_ROOT/topk_hit_images.tar" ]; then
          echo "[resume] using existing top-k hits and hit-image tar"
          mkdir -p "$$LOCAL_TOPK"
          cp "$$OUTPUT_ROOT/topk_merged"/unique_topk_* "$$LOCAL_TOPK"/
          tar -C "$$LOCAL_TOPK" -xf "$$OUTPUT_ROOT/topk_hit_images.tar"
        else
          run_topk_shard 0 & p0=$$!
          run_topk_shard 1 & p1=$$!
          run_topk_shard 2 & p2=$$!
          run_topk_shard 3 & p3=$$!
          run_topk_shard 4 & p4=$$!
          run_topk_shard 5 & p5=$$!
          run_topk_shard 6 & p6=$$!
          run_topk_shard 7 & p7=$$!
          wait $$p0 $$p1 $$p2 $$p3 $$p4 $$p5 $$p6 $$p7
          rm -rf "$$LOCAL_TOPK"
          "$$PY" scripts/run_unique_clip_topk_merge.py \
            --shards_dir "$$OUTPUT_ROOT/topk_shards" \
            --output_dir "$$LOCAL_TOPK" \
            --variant modeb_sceneaware_v18_a100_clip_1m_unique \
            --top_k "$$TOP_K"
          cp "$$LOCAL_TOPK"/unique_topk_* "$$OUTPUT_ROOT/topk_merged"/
          tar -C "$$LOCAL_TOPK" -cf "$$OUTPUT_ROOT/topk_hit_images.tar" hit_images
        fi

        "$$PY" - <<'PYCFG'
        import os, yaml
        src = "configs/semantitrace_flux2_klein_gradient_guided.yaml"
        dst = "/tmp/semantitrace_modeb_llmquery_e2e.yaml"
        cfg = yaml.safe_load(open(src, "r", encoding="utf-8"))
        cfg.setdefault("models", {})
        cfg["models"]["surrogate_vlm"] = os.environ["UPLOADED_MODEL_SNAPSHOTS"] + "/qwen"
        with open(dst, "w", encoding="utf-8") as f:
            yaml.safe_dump(cfg, f, sort_keys=False)
        print(open(dst, "r", encoding="utf-8").read())
        PYCFG

        run_e2e_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.done" ]; then
            echo "[resume] e2e shard_$${gpu} already done; skipping"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_mode_aware_e2e_from_topk.py \
              --records "$$LOCAL_RECORDS" \
              --record_root "$$MODEB_DATA_ROOT" \
              --hits "$$LOCAL_TOPK/unique_topk_hits.jsonl" \
              --hit_image_root "$$LOCAL_TOPK/hit_images" \
              --output_dir "$$outdir" \
              --profile modeb_sceneaware_v18_a100_1m_unique \
              --label "Mode-B scene-aware v18 A100 1M unique" \
              --variant modeb_sceneaware_v18_a100_clip_1m_unique \
              --config /tmp/semantitrace_modeb_llmquery_e2e.yaml \
              --max_records 500 \
              --index_size 1000500 \
              --top_k "$$TOP_K" \
              --query_shard_count 8 \
              --query_shard_index "$$gpu" \
              --device cuda
            touch "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.log"
        }

        run_e2e_shard 0 & e0=$$!
        run_e2e_shard 1 & e1=$$!
        run_e2e_shard 2 & e2=$$!
        run_e2e_shard 3 & e3=$$!
        run_e2e_shard 4 & e4=$$!
        run_e2e_shard 5 & e5=$$!
        run_e2e_shard 6 & e6=$$!
        run_e2e_shard 7 & e7=$$!
        wait $$e0 $$e1 $$e2 $$e3 $$e4 $$e5 $$e6 $$e7

        "$$PY" scripts/run_mode_aware_e2e_merge.py \
          --records "$$LOCAL_RECORDS" \
          --record_root "$$MODEB_DATA_ROOT" \
          --shards_dir "$$OUTPUT_ROOT/e2e_shards" \
          --output_dir "$$OUTPUT_ROOT/e2e_merged" \
          --profile modeb_sceneaware_v18_a100_1m_unique \
          --label "Mode-B scene-aware v18 A100 1M unique" \
          --variant modeb_sceneaware_v18_a100_clip_1m_unique \
          --config /tmp/semantitrace_modeb_llmquery_e2e.yaml \
          --max_records 500 \
          --index_size 1000500 \
          --top_k "$$TOP_K"
        echo "[done] Mode-B LLM-query retry complete"
    submit_args:
      env:
        TAR_ROOT: /mnt/default/data/semantitrace_openimages_1m_5tar_20260608
        MODEB_DATA_ROOT: /mnt/default/data/semantitrace_modeb_n500_records_20260608
        OUTPUT_ROOT: /mnt/output/semantitrace_modeb_llmquery_sceneaware_v18_a100_parallel_retry_20260611
        UPLOADED_MODEL_SNAPSHOTS: /mnt/default/models/semantitrace_model_snapshots_20260603
        TOP_K: "3"
        BATCH_SIZE: "512"
        NUM_WORKERS: "8"
        HF_HOME: /scratch/hf_cache
        HUGGINGFACE_HUB_CACHE: /scratch/hf_cache/hub
        TRANSFORMERS_CACHE: /scratch/hf_cache/transformers
        HF_HUB_ENABLE_HF_TRANSFER: "1"
        PIP_CACHE_DIR: /scratch/pip_cache
        XDG_CACHE_HOME: /scratch/xdg_cache
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
