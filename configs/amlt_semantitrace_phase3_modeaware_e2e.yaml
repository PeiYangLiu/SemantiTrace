description: |
  Phase 3 mode-aware Qwen3-VL E2E over Mode-B natural and combined A500+B500
  1M-unique top-k contexts. Hit images are provided as tar files in data storage,
  extracted to /scratch, and read locally. Each job runs four query shards in
  parallel on a 4xA100 node and writes resumable shard outputs to blob.

target:
  service: singularity
  name: msrresrchbasicvc
  workspace_name: Workspace_NLC

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: .

storage:
  output:
    storage_account_name: conversationhub
    container_name: v-peiyangliu
    mount_dir: /mnt/output
    is_output: true

jobs:
  - name: modeb-1m-unique-modeaware-e2e
    identity: managed
    sku: NC_A100_v4:1x80G4-A100-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command:
      - |
        cd /tmp/amlt-code-download 2>/dev/null || cd /mnt/default/code
        set -euo pipefail
        PY=/opt/conda/envs/ptca/bin/python
        if [ ! -x "$$PY" ]; then PY=python; fi
        "$$PY" -m pip install --upgrade pip wheel setuptools
        "$$PY" -m pip install -r requirements-real.txt hf-transfer
        "$$PY" -m pip uninstall -y opencv-python opencv-contrib-python || true
        "$$PY" -m pip install --force-reinstall --no-deps "opencv-python-headless==4.11.0.86"
        "$$PY" -m pip install "transformers>=5.9.0" "accelerate>=1.13.0" "opencv-python-headless>=4.10" "pillow>=12"
        test -f "$$HITS_JSON"
        test -f "$$HIT_IMAGES_TAR"
        test -f "$$RECORDS_JSON"
        test -d "$$UPLOADED_MODEL_SNAPSHOTS/qwen"
        "$$PY" - <<'PYCFG'
        import os, yaml
        src = "configs/semantitrace_flux2_klein_gradient_guided.yaml"
        dst = "/tmp/semantitrace_modeaware_e2e.yaml"
        cfg = yaml.safe_load(open(src, "r", encoding="utf-8"))
        cfg.setdefault("models", {})
        cfg["models"]["surrogate_vlm"] = os.environ["UPLOADED_MODEL_SNAPSHOTS"] + "/qwen"
        with open(dst, "w", encoding="utf-8") as f:
            yaml.safe_dump(cfg, f, sort_keys=False)
        print(open(dst, "r", encoding="utf-8").read())
        PYCFG
        LOCAL_ROOT=/scratch/modeb_phase3_e2e
        HIT_ROOT=$$LOCAL_ROOT/modeb_hit_images
        mkdir -p "$$LOCAL_ROOT" "$$OUTPUT_ROOT/shards" "$$OUTPUT_ROOT/merged"
        if [ ! -f "$$LOCAL_ROOT/.hits_untar.done" ]; then
          rm -rf "$$HIT_ROOT"
          tar -C "$$LOCAL_ROOT" -xf "$$HIT_IMAGES_TAR"
          test -d "$$HIT_ROOT"
          touch "$$LOCAL_ROOT/.hits_untar.done"
        fi
        run_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/shards/shard_$${gpu}.done" ]; then
            echo "[resume] shard_$${gpu} already done; skipping"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_mode_aware_e2e_from_topk.py \
              --records "$$RECORDS_JSON" \
              --record_root "$$RECORD_ROOT" \
              --hits "$$HITS_JSON" \
              --hit_image_root "$$HIT_ROOT" \
              --output_dir "$$outdir" \
              --profile modeb_natural_1m_unique \
              --label "Mode-B natural 1M unique" \
              --variant modeb_natural_clip_1m_unique \
              --config /tmp/semantitrace_modeaware_e2e.yaml \
              --max_records 500 \
              --index_size 1000500 \
              --top_k 3 \
              --query_shard_count 4 \
              --query_shard_index "$$gpu" \
              --device cuda
            touch "$$OUTPUT_ROOT/shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/shards/shard_$${gpu}.log"
        }
        run_shard 0 & p0=$$!
        run_shard 1 & p1=$$!
        run_shard 2 & p2=$$!
        run_shard 3 & p3=$$!
        wait $$p0 $$p1 $$p2 $$p3
        "$$PY" scripts/run_mode_aware_e2e_merge.py \
          --records "$$RECORDS_JSON" \
          --record_root "$$RECORD_ROOT" \
          --shards_dir "$$OUTPUT_ROOT/shards" \
          --output_dir "$$OUTPUT_ROOT/merged" \
          --profile modeb_natural_1m_unique \
          --label "Mode-B natural 1M unique" \
          --variant modeb_natural_clip_1m_unique \
          --config /tmp/semantitrace_modeaware_e2e.yaml \
          --max_records 500 \
          --index_size 1000500 \
          --top_k 3
        echo "[done] Mode-B mode-aware E2E complete"
    submit_args:
      env:
        RECORDS_JSON: /mnt/default/data/semantitrace_modeb_n500_records_20260608/nontext_modeb_natural_1m_n500/canary_records_first500.json
        RECORD_ROOT: /mnt/default/data/semantitrace_modeb_n500_records_20260608
        HITS_JSON: /mnt/default/data/semantitrace_phase3_topk_json_20260609/modeb_unique_topk_hits.jsonl
        HIT_IMAGES_TAR: /mnt/default/data/semantitrace_phase3_hit_image_tars_20260609/modeb_1m_unique_hit_images.tar
        OUTPUT_ROOT: /mnt/output/semantitrace_modeb_1m_unique_modeaware_e2e_20260609
        UPLOADED_MODEL_SNAPSHOTS: /mnt/default/models/semantitrace_model_snapshots_20260603
        HF_HOME: /scratch/hf_cache
        HUGGINGFACE_HUB_CACHE: /scratch/hf_cache/hub
        TRANSFORMERS_CACHE: /scratch/hf_cache/transformers
        HF_HUB_ENABLE_HF_TRANSFER: "1"
        PIP_CACHE_DIR: /scratch/pip_cache
        XDG_CACHE_HOME: /scratch/xdg_cache
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

