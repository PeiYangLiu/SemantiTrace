defaults:
  seed: 42

backends:
  encoder: deterministic
  ocr: simple
  mask_generator: grid
  vlm: heuristic
  editor: diffusers_inpaint

models:
  inpaint_model: "stable-diffusion-v1-5/stable-diffusion-inpainting"
  clip_model: "ViT-L-14"
  clip_pretrained: "openai"
  surrogate_vlm: "Qwen/Qwen3-VL-8B-Instruct"

anchor_mining:
  num_clusters: 100
  knn_k: 10
  min_canvas_area_ratio: 0.01
  ocr_confidence_threshold: 0.5
  top_candidates_per_cluster: 8
  kmeans_iters: 25

canary_generation:
  acronym_length: [3, 5]
  num_probe_queries: 3
  vlm_temperature: 0.2
  max_retries: 3

dual_guided_diffusion:
  lambda_ret: 2.5
  lambda_gen: 4.0
  eta: 0.5
  num_ddim_steps: 30
  guidance_scale: 7.5
  require_gradient_editor: false

editor:
  image_size: 512
  num_inference_steps: 30
  guidance_scale: 8.0
  strength: 0.98
  torch_dtype: "float16"
  max_mask_area_ratio: 0.014
  min_mask_width: 96
  min_mask_height: 32
  label_aspect_ratio: 2.7
  mask_feather_radius: 5.0
  render_signature: true
  text_opacity: 0.62
  stroke_opacity: 0.18
  text_blur_radius: 0.35
  font_height_ratio: 0.58
  font_width_ratio: 0.68

verification:
  num_canaries: 100
  num_probes_per_canary: 3
  significance_level: 0.01
  retrieval_top_k: 3
