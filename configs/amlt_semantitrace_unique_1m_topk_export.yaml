description: |
  Phase 2 exact top-k export for natural Mode-B and combined A500+B500 over the
  1M unique OpenImages pool. Each job uses one 4xA100 node, extracts the five
  tar shards to local /scratch, runs four CLIP shards in parallel, and merges
  global top-k watermarked/clean context images into /mnt/output for downstream
  Qwen3-VL E2E jobs.

target:
  service: singularity
  name: msrresrchbasicvc
  workspace_name: Workspace_NLC

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: .

data:
  local_dir: /datadisk/peiyang/semantitrace_openimages_1m_512/tar_shards_5
  remote_dir: data/semantitrace_openimages_1m_5tar_20260608
  storage_id: default

storage:
  output:
    storage_account_name: conversationhub
    container_name: v-peiyangliu
    mount_dir: /mnt/output
    is_output: true

jobs:
  - name: modeb-1m-unique-topk-export
    identity: managed
    sku: NC_A100_v4:1x80G4-A100-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command:
      - |
        cd /tmp/amlt-code-download 2>/dev/null || cd /mnt/default/code
        set -euo pipefail
        PY=/opt/conda/envs/ptca/bin/python
        if [ ! -x "$$PY" ]; then PY=python; fi
        "$$PY" -m pip install --upgrade pip wheel setuptools
        "$$PY" -m pip install "open-clip-torch>=3.3.0" "pillow>=12"
        test -d "$$TAR_ROOT"
        test -f "$$MODEB_DATA_ROOT/nontext_modeb_natural_1m_n500/canary_records_first500.json"
        LOCAL_ROOT=/scratch/modeb_1m_unique_topk
        LOCAL_IMAGES=$$LOCAL_ROOT/images
        mkdir -p "$$LOCAL_ROOT" "$$LOCAL_IMAGES" "$$OUTPUT_ROOT/shards" "$$OUTPUT_ROOT/merged"
        if [ ! -f "$$LOCAL_ROOT/.untar.done" ]; then
          rm -rf "$$LOCAL_IMAGES"
          mkdir -p "$$LOCAL_IMAGES"
          echo "[untar] extracting all OpenImages tar shards to $$LOCAL_IMAGES"
          for tar_file in "$$TAR_ROOT"/*.tar; do
            echo "[untar] $$tar_file"
            tar -C "$$LOCAL_IMAGES" -xf "$$tar_file"
          done
          touch "$$LOCAL_ROOT/.untar.done"
        fi
        run_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/shards/shard_$${gpu}.done" ]; then
            echo "[resume] shard_$${gpu} already done; skipping"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_unique_clip_topk_shard.py \
              --records "$$MODEB_DATA_ROOT/nontext_modeb_natural_1m_n500/canary_records_first500.json" \
              --record_root "$$MODEB_DATA_ROOT" \
              --distractor_dir "$$LOCAL_IMAGES" \
              --output_dir "$$outdir" \
              --file_shard_count 4 \
              --file_shard_index "$$gpu" \
              --max_records 500 \
              --top_k "$$TOP_K" \
              --batch_size "$$BATCH_SIZE" \
              --num_workers "$$NUM_WORKERS" \
              --device cuda
            touch "$$OUTPUT_ROOT/shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/shards/shard_$${gpu}.log"
        }
        run_shard 0 & p0=$$!
        run_shard 1 & p1=$$!
        run_shard 2 & p2=$$!
        run_shard 3 & p3=$$!
        wait $$p0 $$p1 $$p2 $$p3
        "$$PY" scripts/run_unique_clip_topk_merge.py \
          --shards_dir "$$OUTPUT_ROOT/shards" \
          --output_dir "$$OUTPUT_ROOT/merged" \
          --variant modeb_natural_clip_1m_unique \
          --top_k "$$TOP_K"
        echo "[done] Mode-B 1M unique top-k export complete"
    submit_args:
      env:
        TAR_ROOT: /mnt/default/data/semantitrace_openimages_1m_5tar_20260608
        MODEB_DATA_ROOT: /mnt/default/data/semantitrace_modeb_n500_records_20260608
        OUTPUT_ROOT: /mnt/output/semantitrace_modeb_1m_unique_topk_20260608
        TOP_K: "3"
        BATCH_SIZE: "512"
        NUM_WORKERS: "8"
        HF_HOME: /scratch/hf_cache
        HUGGINGFACE_HUB_CACHE: /scratch/hf_cache/hub
        TRANSFORMERS_CACHE: /scratch/hf_cache/transformers
        HF_HUB_ENABLE_HF_TRANSFER: "1"
        PIP_CACHE_DIR: /scratch/pip_cache
        XDG_CACHE_HOME: /scratch/xdg_cache
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

  - name: combined-a500-b500-1m-unique-topk-export
    identity: managed
    sku: NC_A100_v4:1x80G4-A100-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command:
      - |
        cd /tmp/amlt-code-download 2>/dev/null || cd /mnt/default/code
        set -euo pipefail
        PY=/opt/conda/envs/ptca/bin/python
        if [ ! -x "$$PY" ]; then PY=python; fi
        "$$PY" -m pip install --upgrade pip wheel setuptools
        "$$PY" -m pip install "open-clip-torch>=3.3.0" "pillow>=12"
        test -d "$$TAR_ROOT"
        test -f "$$COMBINED_DATA_ROOT/records/combined_a500_b500.json"
        LOCAL_ROOT=/scratch/combined_a500_b500_1m_unique_topk
        LOCAL_IMAGES=$$LOCAL_ROOT/images
        mkdir -p "$$LOCAL_ROOT" "$$LOCAL_IMAGES" "$$OUTPUT_ROOT/shards" "$$OUTPUT_ROOT/merged"
        if [ ! -f "$$LOCAL_ROOT/.untar.done" ]; then
          rm -rf "$$LOCAL_IMAGES"
          mkdir -p "$$LOCAL_IMAGES"
          echo "[untar] extracting all OpenImages tar shards to $$LOCAL_IMAGES"
          for tar_file in "$$TAR_ROOT"/*.tar; do
            echo "[untar] $$tar_file"
            tar -C "$$LOCAL_IMAGES" -xf "$$tar_file"
          done
          touch "$$LOCAL_ROOT/.untar.done"
        fi
        run_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/shards/shard_$${gpu}.done" ]; then
            echo "[resume] shard_$${gpu} already done; skipping"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_unique_clip_topk_shard.py \
              --records "$$COMBINED_DATA_ROOT/records/combined_a500_b500.json" \
              --record_root "$$COMBINED_DATA_ROOT" \
              --distractor_dir "$$LOCAL_IMAGES" \
              --output_dir "$$outdir" \
              --file_shard_count 4 \
              --file_shard_index "$$gpu" \
              --max_records 1000 \
              --top_k "$$TOP_K" \
              --batch_size "$$BATCH_SIZE" \
              --num_workers "$$NUM_WORKERS" \
              --device cuda
            touch "$$OUTPUT_ROOT/shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/shards/shard_$${gpu}.log"
        }
        run_shard 0 & p0=$$!
        run_shard 1 & p1=$$!
        run_shard 2 & p2=$$!
        run_shard 3 & p3=$$!
        wait $$p0 $$p1 $$p2 $$p3
        "$$PY" scripts/run_unique_clip_topk_merge.py \
          --shards_dir "$$OUTPUT_ROOT/shards" \
          --output_dir "$$OUTPUT_ROOT/merged" \
          --variant combined_a500_b500_clip_1m_unique \
          --top_k "$$TOP_K"
        echo "[done] combined A500+B500 1M unique top-k export complete"
    submit_args:
      env:
        TAR_ROOT: /mnt/default/data/semantitrace_openimages_1m_5tar_20260608
        COMBINED_DATA_ROOT: /mnt/default/data/semantitrace_combined_a500_b500_records_20260608
        OUTPUT_ROOT: /mnt/output/semantitrace_combined_a500_b500_1m_unique_topk_20260608
        TOP_K: "3"
        BATCH_SIZE: "512"
        NUM_WORKERS: "8"
        HF_HOME: /scratch/hf_cache
        HUGGINGFACE_HUB_CACHE: /scratch/hf_cache/hub
        TRANSFORMERS_CACHE: /scratch/hf_cache/transformers
        HF_HUB_ENABLE_HF_TRANSFER: "1"
        PIP_CACHE_DIR: /scratch/pip_cache
        XDG_CACHE_HOME: /scratch/xdg_cache
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
