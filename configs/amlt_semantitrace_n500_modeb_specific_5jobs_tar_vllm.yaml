description: |
  Five independent 4-GPU jobs for Mode-B-specific anchor mining with batched vLLM and natural-object generation.
  Each job untars one OpenImages shard to local scratch and runs four local GPU shards.

target:
  service: singularity
  name: msrresrchbasicvc
  workspace_name: Workspace_NLC

environment:
  image: semantitrace/qwen36-vllm-nightly:20260607fix2
  registry: acrnlc.azurecr.io

code:
  local_dir: .

data:
  local_dir: /datadisk/peiyang/semantitrace_openimages_1m_512/tar_shards_5
  remote_dir: data/semantitrace_openimages_1m_5tar_20260608
  storage_id: default

storage:
  output:
    storage_account_name: conversationhub
    container_name: v-peiyangliu
    mount_dir: /mnt/output
    is_output: true

jobs:
  - name: n500-modeb-vllm-group-00
    identity: managed
    sku: NC_A100_v4:1x80G4-A100-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command:
      - |
        cd /tmp/amlt-code-download 2>/dev/null || cd /mnt/default/code
        set -euo pipefail
        PY=python3
        "$$PY" -m pip install --upgrade pip wheel setuptools
        "$$PY" -m pip install -r requirements-real.txt hf-transfer
        "$$PY" -m pip uninstall -y opencv-python opencv-contrib-python || true
        "$$PY" -m pip install --force-reinstall --no-deps "opencv-python-headless==4.11.0.86"
        "$$PY" -m pip install "diffusers>=0.38.0" "open-clip-torch>=3.3.0" "opencv-python-headless>=4.10" "pillow>=12"
        test -d "$$TAR_ROOT"
        test -d "$$UPLOADED_MODEL_SNAPSHOTS/flux"
        test -d "$$UPLOADED_MODEL_SNAPSHOTS/qwen"
        "$$PY" - <<'PYCFG'
        import os, yaml
        src = "configs/semantitrace_flux2_klein_gradient_guided.yaml"
        dst = "/tmp/semantitrace_flux2_klein_gradient_guided_modeb_specific.yaml"
        cfg = yaml.safe_load(open(src, "r", encoding="utf-8"))
        cfg.setdefault("models", {})
        cfg["models"]["inpaint_model"] = os.environ["UPLOADED_MODEL_SNAPSHOTS"] + "/flux"
        cfg["models"]["surrogate_vlm"] = os.environ["UPLOADED_MODEL_SNAPSHOTS"] + "/qwen"
        with open(dst, "w", encoding="utf-8") as f:
            yaml.safe_dump(cfg, f, sort_keys=False)
        print(open(dst, "r", encoding="utf-8").read())
        PYCFG
        GROUP=0
        RUN_ROOT="$$OUTPUT_ROOT"
        LOCAL_ROOT="/scratch/modeb_openimages_group_$${GROUP}"
        LOCAL_IMAGES="$$LOCAL_ROOT/images"
        TAR_PATH="$$TAR_ROOT/openimages_1m_group_00.tar"
        mkdir -p "$$LOCAL_ROOT" "$$RUN_ROOT/anchor_shards" "$$RUN_ROOT/generation_shards"
        if [ ! -f "$$LOCAL_ROOT/.untar.done" ]; then
          rm -rf "$$LOCAL_IMAGES"
          mkdir -p "$$LOCAL_IMAGES"
          echo "[untar] group=$${GROUP} from $$TAR_PATH to $$LOCAL_IMAGES"
          tar -C "$$LOCAL_IMAGES" -xf "$$TAR_PATH"
          touch "$$LOCAL_ROOT/.untar.done"
        fi
        run_local_shard() {
          local local_gpu="$$1"
          local gid=$$((GROUP * 4 + local_gpu))
          local anchor_dir="$$RUN_ROOT/anchor_shards/shard_$${gid}"
          local gen_dir="$$RUN_ROOT/generation_shards/shard_$${gid}"
          mkdir -p "$$anchor_dir" "$$gen_dir"
          (
            export CUDA_VISIBLE_DEVICES="$$local_gpu"
            echo "[stage 1] vllm anchor mining group=$${GROUP} gid=$${gid} gpu=$${local_gpu}"
            "$$PY" scripts/run_modeb_anchor_mining_vllm.py               --candidate_dirs "$$LOCAL_IMAGES"               --output_dir "$$anchor_dir"               --config /tmp/semantitrace_flux2_klein_gradient_guided_modeb_specific.yaml               --target_count "$$ANCHOR_TARGET_PER_SHARD"               --max_candidates "$$MAX_CANDIDATES_PER_GROUP"               --shard_count 4               --shard_index "$$local_gpu"               --min_score "$$MIN_ANCHOR_SCORE"               --batch_size "$$VLLM_BATCH_SIZE"               --max_tokens "$$VLLM_MAX_TOKENS"
            touch "$$RUN_ROOT/anchor_shards/shard_$${gid}.done"
            echo "[stage 2] generation group=$${GROUP} gid=$${gid} gpu=$${local_gpu}"
            "$$PY" scripts/run_nontext_modeb_natural_generation.py               --source_records "$$anchor_dir/anchor_records.json"               --output_dir "$$gen_dir"               --config /tmp/semantitrace_flux2_klein_gradient_guided_modeb_specific.yaml               --num_canaries "$$TOTAL_TARGET"               --shard_count "$$GLOBAL_SHARDS"               --shard_index "$$gid"               --planner_mode free               --max_attempts "$$MAX_ATTEMPTS"               --min_masked_delta "$$MIN_MASKED_DELTA"               --device cuda
            touch "$$RUN_ROOT/generation_shards/shard_$${gid}.done"
            echo "[done] group=$${GROUP} gid=$${gid}"
          ) 2>&1 | tee "$$RUN_ROOT/generation_shards/shard_$${gid}.log"
        }
        run_local_shard 0 & p0=$$!
        run_local_shard 1 & p1=$$!
        run_local_shard 2 & p2=$$!
        run_local_shard 3 & p3=$$!
        wait $$p0 $$p1 $$p2 $$p3
        echo "[done] group $${GROUP} complete"
    submit_args:
      env:
        TAR_ROOT: /mnt/default/data/semantitrace_openimages_1m_5tar_20260608
        OUTPUT_ROOT: /mnt/output/semantitrace_n500_modeb_specific_full_5job_vllm_20260608
        UPLOADED_MODEL_SNAPSHOTS: /mnt/default/models/semantitrace_model_snapshots_20260603
        GLOBAL_SHARDS: "20"
        ANCHOR_TARGET_PER_SHARD: "250"
        TOTAL_TARGET: "500"
        MAX_CANDIDATES_PER_GROUP: "200000"
        MIN_ANCHOR_SCORE: "70"
        MAX_ATTEMPTS: "4"
        MIN_MASKED_DELTA: "0.05"
        VLLM_BATCH_SIZE: "32"
        VLLM_MAX_TOKENS: "160"
        HF_HOME: /scratch/hf_cache
        HUGGINGFACE_HUB_CACHE: /scratch/hf_cache/hub
        TRANSFORMERS_CACHE: /scratch/hf_cache/transformers
        HF_HUB_ENABLE_HF_TRANSFER: "1"
        PIP_CACHE_DIR: /scratch/pip_cache
        XDG_CACHE_HOME: /scratch/xdg_cache
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
