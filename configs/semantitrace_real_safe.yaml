defaults:
  seed: 42

backends:
  encoder: open_clip
  ocr: easyocr
  mask_generator: grid
  vlm: qwen_vl
  editor: diffusers_inpaint

models:
  inpaint_model: "stable-diffusion-v1-5/stable-diffusion-inpainting"
  clip_model: "ViT-L-14"
  clip_pretrained: "openai"
  surrogate_vlm: "Qwen/Qwen3-VL-8B-Instruct"

vlm:
  torch_dtype: "bfloat16"

mask_generator:
  min_size: 28
  rows: 6
  cols: 6
  cell_fraction: 0.70

anchor_mining:
  num_clusters: 100
  cluster_multiplier: 8
  knn_k: 10
  min_canvas_area_ratio: 0.004
  max_canvas_area_ratio: 0.055
  ocr_confidence_threshold: 0.35
  top_candidates_per_cluster: 12
  kmeans_iters: 25
  enable_face_filter: true
  max_face_overlap_ratio: 0.0
  enable_skin_filter: true
  max_skin_ratio: 0.30
  max_text_skin_ratio: 0.75
  enable_body_zone_filter: true
  max_body_zone_overlap_ratio: 0.0
  body_zone_x_scale: 3.0
  body_zone_y_scale: 5.0
  body_zone_y_offset: -0.10
  allow_structural_fallback: false
  min_text_alnum: 4
  max_text_alnum: 5
  max_text_words: 2
  max_non_alnum_ratio: 0.12
  min_letter_ratio: 0.75
  max_consecutive_consonants: 4
  reject_numeric_text: true
  reject_short_lowercase_text: true
  short_text_length: 3
  min_short_text_uppercase_ratio: 0.70
  reject_edge_text: true
  edge_margin_ratio: 0.004
  max_short_text_bbox_area_ratio: 0.020
  max_text_bbox_area_per_alnum_ratio: 0.012

semantic_canvas_filter:
  enabled: true
  max_candidates: 8

canary_generation:
  acronym_length: [3, 5]
  num_probe_queries: 3
  vlm_temperature: 0.0
  max_retries: 2
  match_text_signature_length: true
  derive_text_signature_from_original: true

dual_guided_diffusion:
  lambda_ret: 2.5
  lambda_gen: 4.0
  eta: 0.5
  num_ddim_steps: 30
  guidance_scale: 7.5
  require_gradient_editor: false

editor:
  image_size: 512
  num_inference_steps: 30
  guidance_scale: 8.0
  strength: 0.96
  torch_dtype: "float16"
  max_mask_area_ratio: 0.010
  max_text_mask_area_ratio: 0.035
  min_mask_width: 72
  min_mask_height: 24
  label_aspect_ratio: 2.8
  mask_feather_radius: 5.0
  render_signature: true
  text_opacity: 0.96
  stroke_opacity: 0.03
  text_blur_radius: 0.25
  text_background_opacity: 1.0
  font_height_ratio: 0.62
  font_width_ratio: 0.78
  natural_text_fusion: true
  text_span_replacement: true
  text_replacement_unit: "full"
  text_bbox_padding_ratio: 0.08
  max_quality_local_delta: 0.18
  max_quality_boundary_delta: 0.10
  min_text_length_ratio: 0.75
  max_text_length_ratio: 1.35
  min_style_foreground_fraction: 0.015
  glyph_clone_text_fusion: true

quality_gate:
  enabled: true
  max_attempts: 3

naturalness_gate:
  enabled: true
  crop_padding_ratio: 0.55
  min_crop_size: 192

readability_gate:
  enabled: true
  crop_padding_ratio: 0.45
  min_crop_size: 160

verification:
  num_canaries: 100
  num_probes_per_canary: 3
  significance_level: 0.01
  retrieval_top_k: 3
