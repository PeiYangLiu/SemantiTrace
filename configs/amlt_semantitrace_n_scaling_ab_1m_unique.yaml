description: |
  Unified n-scaling experiments for balanced A+B subsets. Runs n=10,50,100,250
  with exact CLIP top-k retrieval over 1M unique OpenImages and mode-aware
  Qwen3-VL E2E. The n=1000 point reuses the completed full combined A500+B500
  result. Inputs are tarred/extracted to /scratch and outputs are resume-safe.

target:
  service: singularity
  name: msrresrchbasicvc
  workspace_name: Workspace_NLC

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: .

data:
  local_dir: /datadisk/peiyang/semantitrace_openimages_1m_512/tar_shards_5
  remote_dir: data/semantitrace_openimages_1m_5tar_20260608
  storage_id: default

storage:
  output:
    storage_account_name: conversationhub
    container_name: v-peiyangliu
    mount_dir: /mnt/output
    is_output: true

jobs:
  - name: n-scaling-combined-n10
    identity: managed
    sku: NC_A100_v4:1x80G4-A100-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: &n_scaling_command
      - |
        cd /tmp/amlt-code-download 2>/dev/null || cd /mnt/default/code
        set -euo pipefail
        PY=/opt/conda/envs/ptca/bin/python
        if [ ! -x "$$PY" ]; then PY=python; fi
        "$$PY" -m pip install --upgrade pip wheel setuptools
        "$$PY" -m pip install -r requirements-real.txt hf-transfer
        "$$PY" -m pip uninstall -y opencv-python opencv-contrib-python || true
        "$$PY" -m pip install --force-reinstall --no-deps "opencv-python-headless==4.11.0.86"
        "$$PY" -m pip install "transformers>=5.9.0" "accelerate>=1.13.0" "open-clip-torch>=3.3.0" "opencv-python-headless>=4.10" "pillow>=12"
        test -d "$$TAR_ROOT"
        test -f "$$SUBSET_JSON"
        test -f "$$COMBINED_TAR"
        test -d "$$UPLOADED_MODEL_SNAPSHOTS/qwen"
        if [ -f "$$OUTPUT_ROOT/merged/end_to_end_profile_summary.json" ]; then
          echo "[resume] n=$$N_VALUE final summary exists; skipping"
          exit 0
        fi
        "$$PY" - <<'PYCFG'
        import os, yaml
        cfg = yaml.safe_load(open("configs/semantitrace_flux2_klein_gradient_guided.yaml", "r", encoding="utf-8"))
        cfg.setdefault("models", {})
        cfg["models"]["surrogate_vlm"] = os.environ["UPLOADED_MODEL_SNAPSHOTS"] + "/qwen"
        yaml.safe_dump(cfg, open("/tmp/semantitrace_modeaware_e2e.yaml", "w"), sort_keys=False)
        PYCFG
        LOCAL_ROOT=/scratch/n_scaling_$${N_VALUE}
        LOCAL_IMAGES=$$LOCAL_ROOT/openimages
        LOCAL_DATA=$$LOCAL_ROOT/data
        LOCAL_TOPK=$$LOCAL_ROOT/topk_merged
        mkdir -p "$$LOCAL_ROOT" "$$LOCAL_IMAGES" "$$LOCAL_DATA" "$$OUTPUT_ROOT/topk_shards" "$$OUTPUT_ROOT/e2e_shards" "$$OUTPUT_ROOT/merged"
        if [ ! -f "$$LOCAL_ROOT/.untar.done" ]; then
          rm -rf "$$LOCAL_IMAGES" "$$LOCAL_DATA"
          mkdir -p "$$LOCAL_IMAGES" "$$LOCAL_DATA"
          tar -C "$$LOCAL_DATA" -xf "$$COMBINED_TAR"
          for tar_file in "$$TAR_ROOT"/*.tar; do
            echo "[untar] $$tar_file"
            tar -C "$$LOCAL_IMAGES" -xf "$$tar_file"
          done
          touch "$$LOCAL_ROOT/.untar.done"
        fi
        run_topk_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/topk_shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.done" ]; then
            echo "[resume] topk shard_$${gpu} done"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_unique_clip_topk_shard.py \
              --records "$$SUBSET_JSON" \
              --record_root "$$LOCAL_DATA/amlt_combined_a500_b500_records" \
              --distractor_dir "$$LOCAL_IMAGES" \
              --output_dir "$$outdir" \
              --file_shard_count 4 \
              --file_shard_index "$$gpu" \
              --max_records "$$N_VALUE" \
              --top_k 3 \
              --batch_size "$$BATCH_SIZE" \
              --num_workers "$$NUM_WORKERS" \
              --device cuda
            touch "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.log"
        }
        run_topk_shard 0 & p0=$$!
        run_topk_shard 1 & p1=$$!
        run_topk_shard 2 & p2=$$!
        run_topk_shard 3 & p3=$$!
        wait $$p0 $$p1 $$p2 $$p3
        rm -rf "$$LOCAL_TOPK"
        "$$PY" scripts/run_unique_clip_topk_merge.py \
          --shards_dir "$$OUTPUT_ROOT/topk_shards" \
          --output_dir "$$LOCAL_TOPK" \
          --variant "$$VARIANT" \
          --top_k 3
        mkdir -p "$$OUTPUT_ROOT/topk_merged"
        cp "$$LOCAL_TOPK"/unique_topk_* "$$OUTPUT_ROOT/topk_merged/"
        run_e2e_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.done" ]; then
            echo "[resume] e2e shard_$${gpu} done"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_mode_aware_e2e_from_topk.py \
              --records "$$SUBSET_JSON" \
              --record_root "$$LOCAL_DATA/amlt_combined_a500_b500_records" \
              --hits "$$LOCAL_TOPK/unique_topk_hits.jsonl" \
              --hit_image_root "$$LOCAL_TOPK/hit_images" \
              --output_dir "$$outdir" \
              --profile "$$PROFILE" \
              --label "$$LABEL" \
              --variant "$$VARIANT" \
              --config /tmp/semantitrace_modeaware_e2e.yaml \
              --max_records "$$N_VALUE" \
              --index_size "$$INDEX_SIZE" \
              --top_k 3 \
              --query_shard_count 4 \
              --query_shard_index "$$gpu" \
              --device cuda
            touch "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.log"
        }
        run_e2e_shard 0 & q0=$$!
        run_e2e_shard 1 & q1=$$!
        run_e2e_shard 2 & q2=$$!
        run_e2e_shard 3 & q3=$$!
        wait $$q0 $$q1 $$q2 $$q3
        "$$PY" scripts/run_mode_aware_e2e_merge.py \
          --records "$$SUBSET_JSON" \
          --record_root "$$LOCAL_DATA/amlt_combined_a500_b500_records" \
          --shards_dir "$$OUTPUT_ROOT/e2e_shards" \
          --output_dir "$$OUTPUT_ROOT/merged" \
          --profile "$$PROFILE" \
          --label "$$LABEL" \
          --variant "$$VARIANT" \
          --config /tmp/semantitrace_modeaware_e2e.yaml \
          --max_records "$$N_VALUE" \
          --index_size "$$INDEX_SIZE" \
          --top_k 3
        echo "[done] n-scaling $$N_VALUE complete"
    submit_args:
      env: &n10_env
        N_VALUE: "10"
        INDEX_SIZE: "1000010"
        PROFILE: combined_ab_n10_1m_unique
        LABEL: "Combined A+B n=10 1M unique"
        VARIANT: combined_ab_n10_clip_1m_unique
        SUBSET_JSON: /mnt/default/data/semantitrace_n_scaling_subsets_20260609/combined_a5_b5_n10.json
        OUTPUT_ROOT: /mnt/output/semantitrace_n_scaling_ab_n10_1m_unique_20260609
        COMBINED_TAR: /mnt/default/data/semantitrace_phase4_caption_boundary_tars_20260609/combined_a500_b500_records.tar
        TAR_ROOT: /mnt/default/data/semantitrace_openimages_1m_5tar_20260608
        UPLOADED_MODEL_SNAPSHOTS: /mnt/default/models/semantitrace_model_snapshots_20260603
        BATCH_SIZE: "512"
        NUM_WORKERS: "8"
        HF_HOME: /scratch/hf_cache
        HUGGINGFACE_HUB_CACHE: /scratch/hf_cache/hub
        TRANSFORMERS_CACHE: /scratch/hf_cache/transformers
        HF_HUB_ENABLE_HF_TRANSFER: "1"
        PIP_CACHE_DIR: /scratch/pip_cache
        XDG_CACHE_HOME: /scratch/xdg_cache
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

  - name: n-scaling-combined-n50
    identity: managed
    sku: NC_A100_v4:1x80G4-A100-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: *n_scaling_command
    submit_args:
      env:
        <<: *n10_env
        N_VALUE: "50"
        INDEX_SIZE: "1000050"
        PROFILE: combined_ab_n50_1m_unique
        LABEL: "Combined A+B n=50 1M unique"
        VARIANT: combined_ab_n50_clip_1m_unique
        SUBSET_JSON: /mnt/default/data/semantitrace_n_scaling_subsets_20260609/combined_a25_b25_n50.json
        OUTPUT_ROOT: /mnt/output/semantitrace_n_scaling_ab_n50_1m_unique_20260609

  - name: n-scaling-combined-n100
    identity: managed
    sku: NC_A100_v4:1x80G4-A100-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: *n_scaling_command
    submit_args:
      env:
        <<: *n10_env
        N_VALUE: "100"
        INDEX_SIZE: "1000100"
        PROFILE: combined_ab_n100_1m_unique
        LABEL: "Combined A+B n=100 1M unique"
        VARIANT: combined_ab_n100_clip_1m_unique
        SUBSET_JSON: /mnt/default/data/semantitrace_n_scaling_subsets_20260609/combined_a50_b50_n100.json
        OUTPUT_ROOT: /mnt/output/semantitrace_n_scaling_ab_n100_1m_unique_20260609

  - name: n-scaling-combined-n250
    identity: managed
    sku: NC_A100_v4:1x80G4-A100-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: *n_scaling_command
    submit_args:
      env:
        <<: *n10_env
        N_VALUE: "250"
        INDEX_SIZE: "1000250"
        PROFILE: combined_ab_n250_1m_unique
        LABEL: "Combined A+B n=250 1M unique"
        VARIANT: combined_ab_n250_clip_1m_unique
        SUBSET_JSON: /mnt/default/data/semantitrace_n_scaling_subsets_20260609/combined_a125_b125_n250.json
        OUTPUT_ROOT: /mnt/output/semantitrace_n_scaling_ab_n250_1m_unique_20260609
