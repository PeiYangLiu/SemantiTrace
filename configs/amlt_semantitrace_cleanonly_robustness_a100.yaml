description: |
  Clean-only rerun for ICDE robustness rows. Clean index contains only 1M
  distractors (no unwatermarked anchors). Runs N=250 balanced A+B DIP transforms
  and OCR blur/fill, then exact CLIP top-k and rank-gated Qwen3-VL E2E.

target:
  service: singularity
  name: msrresrchbasicvc
  workspace_name: Workspace_NLC

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: .

storage:
  output:
    storage_account_name: conversationhub
    container_name: v-peiyangliu
    mount_dir: /mnt/output
    is_output: true

jobs:
  - name: cleanonly-dip-jpeg-q75
    identity: managed
    sku: 40G8-A100-IB-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: &cleanonly_robustness_command
      - |
        cd /tmp/amlt-code-download 2>/dev/null || cd /mnt/default/code
        set -euo pipefail
        PY=/opt/conda/envs/ptca/bin/python
        if [ ! -x "$$PY" ]; then PY=python; fi
        export PYTHONUSERBASE=/scratch/python_userbase
        export PATH="$$PYTHONUSERBASE/bin:$$PATH"
        "$$PY" -m pip install --user -r requirements-real.txt hf-transfer
        "$$PY" -m pip install --user --force-reinstall --no-deps "opencv-python-headless==4.11.0.86"
        "$$PY" -m pip install --user "transformers>=5.9.0" "accelerate>=1.13.0" "open-clip-torch>=3.3.0" "easyocr>=1.7.2" "opencv-python-headless>=4.10" "pillow>=12"
        test -d "$$TAR_ROOT"
        test -f "$$SUBSET_JSON"
        test -f "$$COMBINED_TAR"
        test -d "$$UPLOADED_MODEL_SNAPSHOTS/qwen"
        if [ -f "$$OUTPUT_ROOT/merged/end_to_end_profile_summary.json" ]; then
          echo "[resume] final summary already exists; skipping $$RUN_NAME"
          exit 0
        fi
        "$$PY" - <<'PYCFG'
        import os, yaml
        cfg = yaml.safe_load(open("configs/semantitrace_flux2_klein_gradient_guided.yaml", "r", encoding="utf-8"))
        cfg.setdefault("models", {})
        cfg["models"]["surrogate_vlm"] = os.environ["UPLOADED_MODEL_SNAPSHOTS"] + "/qwen"
        yaml.safe_dump(cfg, open("/tmp/semantitrace_modeaware_e2e.yaml", "w"), sort_keys=False)
        PYCFG
        LOCAL_ROOT=/scratch/cleanonly_$${RUN_NAME}
        LOCAL_IMAGES=$$LOCAL_ROOT/openimages
        LOCAL_DATA=$$LOCAL_ROOT/data
        LOCAL_RECORDS=$$LOCAL_ROOT/records
        LOCAL_TOPK=$$LOCAL_ROOT/topk_merged
        export EASYOCR_MODULE_PATH=$$LOCAL_ROOT/easyocr
        mkdir -p "$$LOCAL_ROOT" "$$LOCAL_IMAGES" "$$LOCAL_DATA" "$$LOCAL_RECORDS" "$$EASYOCR_MODULE_PATH" "$$OUTPUT_ROOT/topk_shards" "$$OUTPUT_ROOT/e2e_shards" "$$OUTPUT_ROOT/merged" "$$OUTPUT_ROOT/records"
        if [ ! -f "$$LOCAL_ROOT/.untar.done" ]; then
          rm -rf "$$LOCAL_IMAGES" "$$LOCAL_DATA"
          mkdir -p "$$LOCAL_IMAGES" "$$LOCAL_DATA"
          tar -C "$$LOCAL_DATA" -xf "$$COMBINED_TAR"
          for tar_file in "$$TAR_ROOT"/*.tar; do
            echo "[untar] $$tar_file"
            tar -C "$$LOCAL_IMAGES" -xf "$$tar_file"
          done
          touch "$$LOCAL_ROOT/.untar.done"
        fi
        if [ "$$MATERIALIZER" = "dip" ]; then
          "$$PY" scripts/materialize_combined_dip_records.py \
            --records "$$SUBSET_JSON" \
            --record_root "$$LOCAL_DATA/amlt_combined_a500_b500_records" \
            --output_dir "$$LOCAL_RECORDS" \
            --operation "$$OPERATION" \
            --max_records 250
        elif [ "$$MATERIALIZER" = "ocr" ]; then
          "$$PY" scripts/materialize_combined_ocr_defense_records.py \
            --records "$$SUBSET_JSON" \
            --record_root "$$LOCAL_DATA/amlt_combined_a500_b500_records" \
            --output_dir "$$LOCAL_RECORDS" \
            --defense "$$OPERATION" \
            --max_records 250 \
            --device cuda
        else
          echo "unknown MATERIALIZER=$$MATERIALIZER" >&2
          exit 2
        fi
        cp "$$LOCAL_RECORDS/canary_records.json" "$$OUTPUT_ROOT/records/canary_records.json"
        run_topk_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/topk_shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.done" ]; then
            echo "[resume] topk shard_$${gpu} done"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_unique_clip_topk_shard.py \
              --records "$$LOCAL_RECORDS/canary_records.json" \
              --record_root "$$LOCAL_RECORDS" \
              --distractor_dir "$$LOCAL_IMAGES" \
              --output_dir "$$outdir" \
              --file_shard_count 8 \
              --file_shard_index "$$gpu" \
              --max_records 250 \
              --top_k 3 \
              --batch_size "$$BATCH_SIZE" \
              --num_workers "$$NUM_WORKERS" \
              --device cuda
            touch "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/topk_shards/shard_$${gpu}.log"
        }
        for gpu in 0 1 2 3 4 5 6 7; do run_topk_shard "$$gpu" & done
        wait
        rm -rf "$$LOCAL_TOPK"
        "$$PY" scripts/run_unique_clip_topk_merge.py \
          --shards_dir "$$OUTPUT_ROOT/topk_shards" \
          --output_dir "$$LOCAL_TOPK" \
          --variant "$$VARIANT" \
          --top_k 3
        mkdir -p "$$OUTPUT_ROOT/topk_merged"
        cp "$$LOCAL_TOPK"/unique_topk_* "$$OUTPUT_ROOT/topk_merged/"
        tar -C "$$LOCAL_TOPK" -cf "$$OUTPUT_ROOT/topk_hit_images.tar" hit_images
        run_e2e_shard() {
          local gpu="$$1"
          local outdir="$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}"
          if [ -f "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.done" ]; then
            echo "[resume] e2e shard_$${gpu} done"
            return 0
          fi
          mkdir -p "$$outdir"
          (
            export CUDA_VISIBLE_DEVICES="$$gpu"
            "$$PY" scripts/run_mode_aware_e2e_from_topk.py \
              --records "$$LOCAL_RECORDS/canary_records.json" \
              --record_root "$$LOCAL_RECORDS" \
              --hits "$$LOCAL_TOPK/unique_topk_hits.jsonl" \
              --hit_image_root "$$LOCAL_TOPK/hit_images" \
              --output_dir "$$outdir" \
              --profile "$$PROFILE" \
              --label "$$LABEL" \
              --variant "$$VARIANT" \
              --config /tmp/semantitrace_modeaware_e2e.yaml \
              --max_records 250 \
              --index_size 1000250 \
              --top_k 3 \
              --query_shard_count 8 \
              --query_shard_index "$$gpu" \
              --device cuda
            touch "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.done"
          ) 2>&1 | tee "$$OUTPUT_ROOT/e2e_shards/shard_$${gpu}.log"
        }
        for gpu in 0 1 2 3 4 5 6 7; do run_e2e_shard "$$gpu" & done
        wait
        "$$PY" scripts/run_mode_aware_e2e_merge.py \
          --records "$$LOCAL_RECORDS/canary_records.json" \
          --record_root "$$LOCAL_RECORDS" \
          --shards_dir "$$OUTPUT_ROOT/e2e_shards" \
          --output_dir "$$OUTPUT_ROOT/merged" \
          --profile "$$PROFILE" \
          --label "$$LABEL" \
          --variant "$$VARIANT" \
          --config /tmp/semantitrace_modeaware_e2e.yaml \
          --max_records 250 \
          --index_size 1000250 \
          --top_k 3
        echo "[done] clean-only robustness $$RUN_NAME complete"
    submit_args:
      env: &base_env
        RUN_NAME: dip_jpeg_q75
        MATERIALIZER: dip
        OPERATION: jpeg_q75
        PROFILE: cleanonly_dip_jpeg_q75_n250
        LABEL: "Clean-only DIP JPEG Q75 n=250"
        VARIANT: cleanonly_dip_jpeg_q75_clip_1m_unique
        OUTPUT_ROOT: /mnt/output/semantitrace_cleanonly_dip_jpeg_q75_n250_20260611
        SUBSET_JSON: /mnt/default/data/semantitrace_n_scaling_subsets_20260609/combined_a125_b125_n250.json
        COMBINED_TAR: /mnt/default/data/semantitrace_phase4_caption_boundary_tars_20260609/combined_a500_b500_records.tar
        TAR_ROOT: /mnt/default/data/semantitrace_openimages_1m_5tar_20260608
        UPLOADED_MODEL_SNAPSHOTS: /mnt/default/models/semantitrace_model_snapshots_20260603
        BATCH_SIZE: "512"
        NUM_WORKERS: "8"
        HF_HOME: /scratch/hf_cache
        HUGGINGFACE_HUB_CACHE: /scratch/hf_cache/hub
        TRANSFORMERS_CACHE: /scratch/hf_cache/transformers
        HF_HUB_ENABLE_HF_TRANSFER: "1"
        PIP_CACHE_DIR: /scratch/pip_cache
        XDG_CACHE_HOME: /scratch/xdg_cache
        PYTHONUNBUFFERED: "1"
        TOKENIZERS_PARALLELISM: "false"
        PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True

  - name: cleanonly-dip-rescale-0-5
    identity: managed
    sku: 40G8-A100-IB-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: *cleanonly_robustness_command
    submit_args:
      env:
        <<: *base_env
        RUN_NAME: dip_rescale_0_5
        OPERATION: rescale_0_5
        PROFILE: cleanonly_dip_rescale_0_5_n250
        LABEL: "Clean-only DIP rescale 0.5 n=250"
        VARIANT: cleanonly_dip_rescale_0_5_clip_1m_unique
        OUTPUT_ROOT: /mnt/output/semantitrace_cleanonly_dip_rescale_0_5_n250_20260611

  - name: cleanonly-dip-gaussian-sigma5
    identity: managed
    sku: 40G8-A100-IB-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: *cleanonly_robustness_command
    submit_args:
      env:
        <<: *base_env
        RUN_NAME: dip_gaussian_sigma5
        OPERATION: gaussian_sigma5
        PROFILE: cleanonly_dip_gaussian_sigma5_n250
        LABEL: "Clean-only DIP gaussian sigma5 n=250"
        VARIANT: cleanonly_dip_gaussian_sigma5_clip_1m_unique
        OUTPUT_ROOT: /mnt/output/semantitrace_cleanonly_dip_gaussian_sigma5_n250_20260611

  - name: cleanonly-dip-center-crop-10
    identity: managed
    sku: 40G8-A100-IB-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: *cleanonly_robustness_command
    submit_args:
      env:
        <<: *base_env
        RUN_NAME: dip_center_crop_10
        OPERATION: center_crop_10
        PROFILE: cleanonly_dip_center_crop_10_n250
        LABEL: "Clean-only DIP center crop 10 n=250"
        VARIANT: cleanonly_dip_center_crop_10_clip_1m_unique
        OUTPUT_ROOT: /mnt/output/semantitrace_cleanonly_dip_center_crop_10_n250_20260611

  - name: cleanonly-ocr-blur-n250
    identity: managed
    sku: 40G8-A100-IB-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: *cleanonly_robustness_command
    submit_args:
      env:
        <<: *base_env
        RUN_NAME: ocr_blur
        MATERIALIZER: ocr
        OPERATION: ocr_blur
        PROFILE: cleanonly_ocr_blur_n250
        LABEL: "Clean-only OCR blur n=250"
        VARIANT: cleanonly_ocr_blur_clip_1m_unique
        OUTPUT_ROOT: /mnt/output/semantitrace_cleanonly_ocr_blur_n250_20260611

  - name: cleanonly-ocr-fill-n250
    identity: managed
    sku: 40G8-A100-IB-NvLink
    process_count_per_node: 1
    sla_tier: standard
    command: *cleanonly_robustness_command
    submit_args:
      env:
        <<: *base_env
        RUN_NAME: ocr_fill
        MATERIALIZER: ocr
        OPERATION: ocr_fill
        PROFILE: cleanonly_ocr_fill_n250
        LABEL: "Clean-only OCR fill n=250"
        VARIANT: cleanonly_ocr_fill_clip_1m_unique
        OUTPUT_ROOT: /mnt/output/semantitrace_cleanonly_ocr_fill_n250_20260611
